{% set version = "1.1.0" %}

package:
  name: tomocupy
  version: {{ version }}

source:
  url: https://github.com/tomography/tomocupy/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d736cdc671c8b22685c668281ec7732e5183495d73bbfccdcf02559420f80b6d

build:
  skip: True  # [cuda_compiler_version in (undefined, "None")]
  skip: True  # [win]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}
    - cmake
    - ninja
  host:
    - cuda-version {{ cuda_compiler_version }}  # [cuda_compiler_version != "None"]
    - cudatoolkit                               # [cuda_compiler_version != "None"]
    - numpy
    - pip
    - python
    - scikit-build >=0.17
    - setuptools
  run:
    - {{ pin_compatible('python') }}
    - cudatoolkit
    - cupy
    - h5py
    - numexpr
    - numpy
    - opencv
    - pywavelets
    - tifffile

test:
  imports:
    - tomocupy
  commands:
    - tomocupy recon -h

about:
  home: https://github.com/tomography/tomocupy
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: GPU-based reconstruction of tomographic and laminographic data
  description: |
    Tomocupy is a Python package and command-line interface for GPU
    reconstruction of tomographic/laminographic data in 16-bit and 32-bit
    precision using CuPy and CUDA C.
  doc_url: https://tomocupy.readthedocs.io/en/latest/
  dev_url: https://github.com/tomography/tomocupy

extra:
  recipe-maintainers:
    - nikitinvv
